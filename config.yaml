# RSS Feed Configuration
feeds:
  opml_file: "${OPML_FILE}"
  timeout_seconds: 10
  skip_feedly_proxy: true

# Schedule Configuration
schedule:
  interval_hours: 24
  time_window_hours: 24

# LLM Configuration (Ollama)
llm:
  base_url: "${OLLAMA_BASE_URL}"
  embedding_model: "nomic-embed-text"
  dedup_threshold: 0.85

# Deduplication Settings
deduplication:
  preferred_sources:
    - "Reuters"
    - "Bloomberg"
    - "WSJ"

# Email Configuration
email:
  smtp_server: "smtp.gmail.com"
  smtp_port: 587
  sender_email: "${GMAIL_ADDRESS}"
  sender_password: "${GMAIL_APP_PASSWORD}"
  recipients:
    - "${PERSONAL_EMAIL}"
    - "${COMPANY_EMAIL}"
  max_articles_per_email: 300

# Output Configuration
output:
  save_html: true
  html_dir: "./output"
  log_file: "./logs/news_filter.log"
  state_file: "./state/last_run.json"

# System Configuration
system:
  poweroff_after_run: false

# Mailing List Configuration (Gmail IMAP)
mailing_lists:
  enabled: true           # true にするとメーリングリスト取得を有効化
  imap_server: "imap.gmail.com"
  imap_port: 993
  timeout_seconds: 30
  # 認証情報は email.sender_email / email.sender_password (GMAIL_ADDRESS / GMAIL_APP_PASSWORD) を流用

  lists:
    # FROM アドレスで識別する例
    # - name: "Example List"
    #   category: "Mailing Lists"
    #   match_by: "from"
    #   address: "example-list@googlegroups.com"

    - name: "Tech mailing list"
      category: "Tech news"
      label: "Tech news"
