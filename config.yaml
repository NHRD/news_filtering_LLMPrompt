# RSS Feed Configuration
feeds:
  opml_file: "${OPML_FILE}"
  timeout_seconds: 10
  skip_feedly_proxy: true

# Schedule Configuration
schedule:
  interval_hours: 24
  time_window_hours: 24

# Gemini Configuration
gemini:
  model: "gemini-2.5-flash-lite"
  dedup_batch_size: 3000

# Deduplication Settings
deduplication:
  on_dedup_failure: "send_anyway"
  preferred_sources:
    - "Reuters"
    - "Bloomberg"
    - "WSJ"
    - "TechCrunch"
    - "The Verge"

# Email Configuration
email:
  smtp_server: "smtp.gmail.com"
  smtp_port: 587
  sender_email: "${GMAIL_ADDRESS}"
  sender_password: "${GMAIL_APP_PASSWORD}"
  recipients:
    - "${PERSONAL_EMAIL}"
    - "${COMPANY_EMAIL}"
  max_articles_per_email: 300

# Output Configuration
output:
  save_html: true
  html_dir: "./output"
  log_file: "./logs/news_filter.log"
  state_file: "./state/last_run.json"

translation:
  batch_size: 200
  batch_interval_seconds: 15
  on_translate_failure: "skip"

# System Configuration
system:
  poweroff_after_run: true
