<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <style>
    body {
      font-family: Arial, sans-serif;
      max-width: 800px;
      margin: 0 auto;
      color: #202124;
    }
    .header {
      background: #d93025;
      color: white;
      padding: 20px;
    }
    .error-container {
      margin: 20px 0;
      padding: 20px;
      background: #fdf2f2;
      border: 1px solid #d93025;
      border-radius: 6px;
    }
    .error-title {
      color: #d93025;
      font-weight: bold;
      font-size: 1.2em;
      margin-bottom: 10px;
    }
    .error-message {
      white-space: pre-wrap;
      font-family: monospace;
      background: #fff;
      padding: 10px;
      border: 1px solid #eee;
    }
    .footer {
      font-size: 0.8em;
      color: #666;
      margin-top: 30px;
      border-top: 1px solid #eee;
      padding-top: 12px;
    }
  </style>
</head>
<body>
  <div class="header">
    <h1>System Error Notification</h1>
  </div>

  <div class="error-container">
    <div class="error-title">Error in News Filtering Pipeline</div>
    <p>An error occurred during the deduplication phase. The pipeline has been aborted to ensure high quality and prevent missed articles in the next run.</p>
    <div class="error-message">{{ error_message }}</div>
  </div>

  <div class="footer">
    <p>Generated by RSS News Filter | {{ generation_time }}</p>
  </div>
</body>
</html>
